services:
  backend:
    build:
      context: ./backend
    container_name: dhansathi-backend
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: ${MONGODB_URI:-}
      MONGO_URI: ${MONGO_URI:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}

  frontend:
    build:
      context: ./frontend
    container_name: dhansathi-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_API_URL: /api
      VITE_PROXY_TARGET: http://backend:5000
